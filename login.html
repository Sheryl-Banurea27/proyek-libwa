<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LibWA Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1A2238; }
    .login-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .login-box h2 { color: #333; margin-bottom: 5px; }
    .login-box p { color: #888; margin-bottom: 30px; font-size: 14px; }
    .form-group input { margin-bottom: 15px; }
    .btn-login { width: 100%; padding: 12px; background: #3457D5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
    .btn-login:hover { background: #2844A8; transform: translateY(-2px); }
    .error-msg { color: #E74C3C; font-size: 13px; margin-bottom: 15px; display: none; background: #FADBD8; padding: 8px; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>LibWA Admin</h2>
    <p>Library Automation System</p>
    <div class="error-msg" id="loginError">Username atau Sandi Salah!</div>
    <form id="loginForm">
      <div class="form-group">
        <label>USERNAME / NIM STAF</label>
        <input type="text" id="username" placeholder="Masukkan NIM/Username" required>
      </div>
      <div class="form-group">
        <label>KATA SANDI</label>
        <input type="password" id="password" placeholder="Masukkan kata sandi" required>
      </div>
      <button type="submit" class="btn-login">Masuk Sistem</button>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
